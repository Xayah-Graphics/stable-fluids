name: stable-fluids Arch Build

on:
  workflow_dispatch:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  arch-build-and-benchmark:
    runs-on: [self-hosted, Linux, X64, archlinux, cuda]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Arch environment
        run: |
          sudo pacman -Syu --noconfirm --needed
          sudo pacman -S --noconfirm --needed base-devel cmake ninja cuda
          nvcc --version
          cmake --version

      - name: Configure CMake
        run: |
          cmake -S . -B build-arch -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build benchmark target
        run: |
          cmake --build build-arch --target stable-fluids-app --parallel

      - name: Run benchmark executable
        run: |
          export LD_LIBRARY_PATH="$PWD/build-arch:${LD_LIBRARY_PATH}"
          ./build-arch/stable-fluids-app
